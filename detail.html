<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Yún xiǎoshuō – Detail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-book-open"></i>
                <span>云<span>小说</span></span>
                <span class="brand-subtitle">by Tan Ade Rizcky</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
                <a href="history.html" class="nav-link"><i class="fas fa-clock-rotate-left"></i> History</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-drive" id="driveConnectBtn" disabled>
                    <i class="fab fa-google-drive"></i>
                    <span id="driveStatus">Loading…</span>
                </button>
                <button class="btn-refresh" id="driveRefreshBtn" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-sync-alt"></i> Reconnect Drive
                </button>
                <button class="btn-refresh" onclick="clearPdfCache()" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-trash"></i> Clear Cache
                </button>
                <small class="drive-path" id="drivePathDisplay">📁 /file/pdf/j-novel/</small>
            </div>
        </aside>

        <div id="sidebarBackdrop" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:99;" onclick="closeSidebar()"></div>

        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="header-actions">
                    <span class="greeting">📖 Novel Detail</span>
                </div>
            </header>

            <div style="margin-bottom:16px;">
                <a href="index.html" class="btn-secondary" style="text-decoration:none; display:inline-flex; align-items:center; gap:8px; padding:8px 16px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text-primary); transition:var(--transition);">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>

            <div id="novelDetailContainer" class="detail-card-container" style="background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:24px;">
                <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start;">
                    <img id="detailCover" src="" alt="Cover" style="width:150px; height:210px; object-fit:contain; border-radius:8px; background:var(--bg-card); border:1px solid var(--border); flex-shrink:0;" />
                    <div style="flex:1; min-width:200px;">
                        <h1 id="detailTitle" style="font-size:2.0rem; font-weight:700; margin:0 0 2px 0; line-height:1.2;">Loading…</h1>
                        <h2 id="detailLatinTitle" style="font-size:1.1rem; color:var(--text-secondary); margin:0 0 2px 0; font-weight:500;">&nbsp;</h2>
                        <h3 id="detailEnglishTitle" style="font-size:0.95rem; color:var(--text-secondary); margin:0 0 6px 0; font-weight:400; opacity:0.8;">&nbsp;</h3>
                        <p id="detailAuthor" style="color:var(--text-secondary); font-size:1rem; margin:0 0 4px 0;">by Unknown</p>

                        <!-- ======== DESCRIPTION WITH READ MORE ======== -->
                        <div class="description-wrapper" id="descriptionWrapper">
                            <p id="detailDescription" class="description-text">No description</p>
                            <button id="readMoreBtn" class="read-more-btn" style="display:none;">Read more</button>
                        </div>

                        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:8px;">
                            <span id="detailStatus" class="status-badge" style="display:inline-block; padding:4px 14px; border-radius:50px; font-size:0.85rem; background:var(--bg-card); color:var(--text-secondary);">Not read</span>
                            <span id="detailVolCount" style="color:var(--text-secondary); font-size:0.85rem;">0 volumes</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="detailBreadcrumb" style="font-size:0.85rem; margin-bottom:12px; color:var(--text-secondary);">
                <span>Loading…</span>
            </div>

            <div id="detailSectionsContainer" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; padding:4px 0;">
                <!-- Rendered by JavaScript -->
            </div>

            <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
                <h3 style="margin:0; font-weight:600; font-size:1.1rem;">
                    <i class="fas fa-layer-group" style="color:var(--accent);"></i> Volumes
                </h3>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-size:0.8rem; color:var(--text-secondary);">Sort:</span>
                    <button id="sortVolumesToggle" class="btn-secondary" style="padding:4px 14px; font-size:0.8rem; background:var(--bg-card); border:1px solid var(--border); border-radius:4px; cursor:pointer; color:var(--text-primary); transition:var(--transition);">
                        <i class="fas fa-arrow-up"></i> Ascending
                    </button>
                </div>
            </div>
            <div id="detailVolumesContainer" style="display:flex; flex-direction:column; gap:8px;">
                <div class="empty-state">No volumes yet.</div>
            </div>

        </main>
    </div>

    <div id="toast" class="toast"></div>

    <div class="modal-overlay" id="readerModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="readerTitle">Reading</h2>
                <button class="modal-close" id="readerClose">&times;</button>
            </div>
            <div class="modal-body" id="readerBody"><div class="loading">Loading content…</div></div>
        </div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
