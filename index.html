<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Yún xiǎoshuō</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-book-open"></i>
                <span>云<span>小说</span></span>
                <span class="brand-subtitle">by Tan Ade Rizcky</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link active"><i class="fas fa-home"></i> Home</a>
                <a href="history.html" class="nav-link"><i class="fas fa-clock-rotate-left"></i> History</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-drive" id="driveConnectBtn" disabled>
                    <i class="fab fa-google-drive"></i>
                    <span id="driveStatus">Loading…</span>
                </button>
                <button class="btn-refresh" id="driveRefreshBtn" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-sync-alt"></i> Reconnect Drive
                </button>
                <button class="btn-refresh" onclick="clearPdfCache()" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-trash"></i> Clear Cache
                </button>
                <small class="drive-path" id="drivePathDisplay">📁 /file/pdf/j-novel/</small>
            </div>
        </aside>

        <div id="sidebarBackdrop" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:99;" onclick="closeSidebar()"></div>

        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search novels…">
                </div>
                <div class="header-actions">
                    <span class="greeting"><span style="color:var(--accent);">云</span>小说</span>
                </div>
            </header>

            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat"><span class="stat-number" id="statNovels">0</span><span class="stat-label">Novels</span></div>
                <div class="stat"><span class="stat-number" id="statVolumes">0</span><span class="stat-label">Volumes</span></div>
                <div class="stat"><span class="stat-number" id="statReading">0</span><span class="stat-label">Reading</span></div>
            </div>

            <!-- Currently Reading -->
            <section class="section" id="currentlyReadingSection" style="display:none;">
                <div class="section-header">
                    <h2><i class="fas fa-book-open-reader"></i> Currently Reading</h2>
                    <span class="badge" id="readingBadge">Latest 7</span>
                </div>
                <div id="currentlyReadingContainer" class="currently-reading-horizontal"></div>
            </section>

            <!-- All Novels -->
            <section class="section">
                <div class="section-header">
                    <h2><i class="fas fa-list"></i> All Novels</h2>
                </div>

                <div class="controls-row">
                    <div class="sort-wrapper">
                        <label>Sort:</label>
                        <select id="sortSelect">
                            <option value="az">A → Z</option>
                            <option value="za">Z → A</option>
                            <option value="newest">Newest</option>
                            <option value="oldest">Oldest</option>
                        </select>
                    </div>
                    <button class="btn-refresh" id="forceReimportBtn" style="padding:6px 16px; font-size:0.75rem;">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>

                <div id="novelGridContainer" class="novel-grid">
                    <div class="empty-state">No novels found. Connect Drive to automatically import your library.</div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <div class="modal-overlay" id="readerModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="readerTitle">Reading</h2>
                <button class="modal-close" id="readerClose">&times;</button>
            </div>
            <div class="modal-body" id="readerBody"><div class="loading">Loading content…</div></div>
        </div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
