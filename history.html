<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Library – History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-book-open"></i>
                <span>Novel<span>Library</span></span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
                <a href="list.html" class="nav-link"><i class="fas fa-list"></i> Manage Novels</a>
                <a href="history.html" class="nav-link active"><i class="fas fa-clock-rotate-left"></i> History</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-drive" id="driveConnectBtn" disabled>
                    <i class="fab fa-google-drive"></i>
                    <span id="driveStatus">Loading...</span>
                </button>
                <button class="btn-refresh" id="driveRefreshBtn" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-sync-alt"></i> Reconnect Drive
                </button>
                <button class="btn-refresh" id="forceReimportBtn" style="margin-left:8px;">
                    <i class="fas fa-sync-alt"></i> Re‑import All (Fresh)
                </button>
                <button class="btn-refresh" onclick="clearPdfCache()" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-trash"></i> Clear PDF Cache
                </button>
                <small class="drive-path" id="drivePathDisplay">📁 /file/pdf/j-novel/</small>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="header-actions">
                    <span class="greeting">📖 History</span>
                </div>
            </header>

            <div class="view-header">
                <h1><i class="fas fa-clock-rotate-left"></i> Full Reading History</h1>
                <span class="subtitle" id="historyCount">0 entries</span>
            </div>

            <div id="fullHistoryContainer" class="history-list full">
                <div class="empty-state">No reading history yet.</div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="script.js"></script>
</body>
</html>
