<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Library – Manage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-book-open"></i>
                <span>Novel<span>Library</span></span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
                <a href="list.html" class="nav-link active"><i class="fas fa-list"></i> Manage Novels</a>
                <a href="history.html" class="nav-link"><i class="fas fa-clock-rotate-left"></i> History</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-drive" id="driveConnectBtn" disabled>
                    <i class="fab fa-google-drive"></i>
                    <span id="driveStatus">Loading...</span>
                </button>
                <button class="btn-refresh" id="driveRefreshBtn" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-sync-alt"></i> Reconnect Drive
                </button>
                <button class="btn-refresh" id="forceReimportBtn" style="margin-left:8px;">
                    <i class="fas fa-sync-alt"></i> Re‑import All (Fresh)
                </button>
                <button class="btn-refresh" onclick="clearPdfCache()" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-trash"></i> Clear PDF Cache
                </button>
                <small class="drive-path" id="drivePathDisplay">📁 /file/pdf/j-novel/</small>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search novels...">
                </div>
                <div class="header-actions">
                    <span class="greeting">📚 Manage Your Library</span>
                </div>
            </header>

            <div class="view-header">
                <h1><i class="fas fa-list"></i> All Novels</h1>
                <span class="subtitle" id="novelCount">0 novels</span>

                <!-- Sort dropdown -->
                <div style="display:flex; gap:8px; align-items:center; margin-left:12px;">
                    <label style="color:var(--text-secondary); font-size:0.85rem;">Sort:</label>
                    <select id="sortSelect" style="background:var(--bg-input); color:var(--text-primary); border:1px solid var(--border); border-radius:4px; padding:4px 8px; font-size:0.85rem;">
                        <option value="az">A → Z</option>
                        <option value="za">Z → A</option>
                        <option value="newest">Newest</option>
                        <option value="oldest">Oldest</option>
                    </select>
                </div>

                <button class="btn-primary" id="showAddFormBtn" style="margin-left:12px;">
                    <i class="fas fa-plus"></i> Add Novel
                </button>
                <button class="btn-refresh" id="refreshDriveBtn">
                    <i class="fas fa-sync-alt"></i> Import from Drive
                </button>
            </div>

            <!-- Add/Edit Form -->
            <div id="novelFormContainer" style="display:none; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <h3 id="formTitle"><i class="fas fa-plus-circle"></i> Add New Novel</h3>
                    <button class="modal-close" id="closeFormBtn" style="font-size:1.5rem; background:none; border:none; color:var(--text-secondary); cursor:pointer;">&times;</button>
                </div>
                <form id="novelForm" class="add-form" style="padding:0; background:transparent; border:none;">
                    <input type="hidden" id="editNovelId" value="">
                    <div class="form-row">
                        <div class="form-group" style="flex:1;">
                            <label>Title *</label>
                            <input type="text" id="formTitleInput" placeholder="e.g. The Silent Kingdom" required>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Author *</label>
                            <input type="text" id="formAuthorInput" placeholder="e.g. Jane Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="formDescriptionInput" rows="2" placeholder="A brief synopsis..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex:1;">
                            <label>Cover URL</label>
                            <input type="url" id="formCoverInput" placeholder="https://example.com/cover.jpg">
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Status</label>
                            <select id="formStatusInput">
                                <option value="reading">Reading</option>
                                <option value="completed">Completed</option>
                                <option value="plan-to-read">Plan to Read</option>
                            </select>
                        </div>
                    </div>

                    <hr>
                    <h3><i class="fas fa-layer-group"></i> Volumes</h3>
                    <p class="help-text">Each volume can have a Google Drive file ID or share link.</p>

                    <div id="formVolumesContainer">
                        <div class="volume-entry">
                            <div class="form-row">
                                <div class="form-group" style="flex:0 0 80px;">
                                    <label>#</label>
                                    <input type="number" class="form-vol-number" value="1" min="1" required>
                                </div>
                                <div class="form-group" style="flex:2;">
                                    <label>Title</label>
                                    <input type="text" class="form-vol-title" placeholder="Volume title">
                                </div>
                                <div class="form-group" style="flex:2;">
                                    <label>File ID / Link</label>
                                    <input type="text" class="form-vol-fileid" placeholder="e.g. 1ABC123DEF456">
                                </div>
                                <div class="form-group" style="flex:0 0 auto;">
                                    <label>&nbsp;</label>
                                    <button type="button" class="btn-remove-volume form-remove-vol">✕</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="button" class="btn-add-volume" id="formAddVolumeBtn">
                        <i class="fas fa-plus"></i> Add Volume
                    </button>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="formSubmitBtn">
                            <i class="fas fa-save"></i> Save Novel
                        </button>
                        <button type="reset" class="btn-secondary" id="formCancelBtn">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Novel Grid -->
            <div id="novelGridContainer" class="novel-grid">
                <div class="empty-state">No novels found. Click "Add Novel" to get started.</div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Reader Modal -->
    <div class="modal-overlay" id="readerModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="readerTitle">Reading</h2>
                <button class="modal-close" id="readerClose">&times;</button>
            </div>
            <div class="modal-body" id="readerBody">
                <div class="loading">Loading content...</div>
            </div>
        </div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
