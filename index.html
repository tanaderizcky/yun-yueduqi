<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Library – Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-book-open"></i>
                <span>Novel<span>Library</span></span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link active"><i class="fas fa-home"></i> Home</a>
                <a href="list.html" class="nav-link"><i class="fas fa-list"></i> Manage Novels</a>
                <a href="history.html" class="nav-link"><i class="fas fa-clock-rotate-left"></i> History</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-drive" id="driveConnectBtn" disabled>
                    <i class="fab fa-google-drive"></i>
                    <span id="driveStatus">Loading...</span>
                </button>
                <!-- 🔥 Reconnect Drive button -->
                <button class="btn-refresh" id="driveRefreshBtn" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-sync-alt"></i> Reconnect Drive
                </button>
                <button class="btn-refresh" id="forceReimportBtn" style="margin-left:8px;">
                    <i class="fas fa-sync-alt"></i> Re‑import All (Fresh)
                </button>
                <button class="btn-refresh" onclick="clearPdfCache()" style="width:100%; margin-top:4px; padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text-secondary); cursor:pointer; font-size:0.8rem; transition:var(--transition);">
                    <i class="fas fa-trash"></i> Clear PDF Cache
                </button>
                <small class="drive-path" id="drivePathDisplay">📁 /file/pdf/j-novel/</small>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search novels...">
                </div>
                <div class="header-actions">
                    <span class="greeting">👋 Welcome</span>
                </div>
            </header>

            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat"><span class="stat-number" id="statNovels">0</span><span class="stat-label">Novels</span></div>
                <div class="stat"><span class="stat-number" id="statVolumes">0</span><span class="stat-label">Volumes</span></div>
                <div class="stat"><span class="stat-number" id="statReading">0</span><span class="stat-label">Reading</span></div>
                <div class="stat"><span class="stat-number" id="statHistory">0</span><span class="stat-label">History</span></div>
            </div>

            <!-- Newest Novel -->
            <section class="section">
                <div class="section-header"><h2><i class="fas fa-star"></i> Newest Novel</h2></div>
                <div id="newestNovelContainer" class="newest-novel-card">
                    <div class="empty-state">No novels yet. <a href="list.html">Go to Manage</a></div>
                </div>
            </section>

            <!-- Currently Reading -->
            <section class="section">
                <div class="section-header"><h2><i class="fas fa-book-open-reader"></i> Currently Reading</h2></div>
                <div id="currentlyReadingContainer" class="currently-reading-grid">
                    <div class="empty-state">You're not reading anything right now.</div>
                </div>
            </section>

            <!-- Recent Volumes (up to 5) -->
            <section class="section">
                <div class="section-header">
                    <h2><i class="fas fa-clock"></i> Recent Volumes</h2>
                    <span class="badge">Latest 5</span>
                </div>
                <div id="recentVolumesContainer" class="volumes-grid">
                    <div class="empty-state">No volumes added yet. <a href="list.html">Add some</a></div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Reader Modal -->
    <div class="modal-overlay" id="readerModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="readerTitle">Reading</h2>
                <button class="modal-close" id="readerClose">&times;</button>
            </div>
            <div class="modal-body" id="readerBody">
                <div class="loading">Loading content...</div>
            </div>
        </div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
